name: 📚 艾莉丝的文档更新

permissions:
  contents: write

on:
  push:
    branches: [Develop/v2]
  pull_request:
    branches: [Develop/v2]
  workflow_dispatch:

jobs:
  update-and-generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 更新API文档
        id: update-api
        run: |
          echo "艾莉丝开始更新API文档了哦~"
          
          # 确保输出目录存在
          mkdir -p docs/api-reference/auto_api
          
          # 运行API文档更新脚本
          if [ -f "scripts/tools/generate-api-docs.py" ]; then
            python scripts/tools/generate-api-docs.py
            echo "API文档更新完成"
          else
            echo "未找到API文档更新脚本，跳过此步骤"
          fi
          
          # 检查API文档是否有更新
          if git diff --quiet docs/api-reference/; then
            echo "API文档没有变化"
            echo "api_updated=false" >> $GITHUB_OUTPUT
          else
            echo "发现了API文档更新"
            echo "api_updated=true" >> $GITHUB_OUTPUT
          fi

      - name: 生成 AI Prompt 文档
        id: generate-ai-prompts
        if: steps.update-api.outputs.api_updated == 'true'
        run: |
          echo "艾莉丝开始生成 AI Prompt 文档~"
          
          # 确保输出目录存在
          mkdir -p docs/ai-support/prompts
          
          # 运行 AI prompt 生成脚本
          if [ -f "scripts/tools/generate-ai-prompts.py" ]; then
            python scripts/tools/generate-ai-prompts.py
            echo "AI Prompt 文档生成完成"
          else
            echo "未找到 AI Prompt 生成脚本，跳过此步骤"
          fi
          
          # 检查 AI Prompt 文档是否有更新
          if git diff --quiet docs/ai-support/prompts/; then
            echo "AI Prompt 文档没有变化"
            echo "ai_prompts_updated=false" >> $GITHUB_OUTPUT
          else
            echo "发现了 AI Prompt 文档更新"
            echo "ai_prompts_updated=true" >> $GITHUB_OUTPUT
          fi

      - name: 生成文档索引
        id: generate-docs-index
        run: |
          echo "艾莉丝开始生成文档索引~"
          
          # 确保输出目录存在
          mkdir -p docs/_meta
          
          # 运行文档索引生成脚本
          if [ -f "scripts/tools/generate-docs-index.py" ]; then
            python scripts/tools/generate-docs-index.py
            echo "文档索引生成完成"
          else
            echo "未找到文档索引生成脚本，跳过此步骤"
          fi
          
          # 检查文档索引是否有更新
          if git diff --quiet docs/_meta/; then
            echo "文档索引没有变化"
            echo "docs_index_updated=false" >> $GITHUB_OUTPUT
          else
            echo "发现了文档索引更新"
            echo "docs_index_updated=true" >> $GITHUB_OUTPUT
          fi

      # - name: 生成类型存根
      #   id: generate-stubs
      #   run: |
      #     echo "艾莉丝开始生成类型存根文件~"
          
      #     # 运行类型存根生成脚本
      #     if [ -f "scripts/tools/generate-type-stubs.py" ]; then
      #       python scripts/tools/generate-type-stubs.py --src src --output src --clean --force
      #       echo "类型存根生成完成"
      #     else
      #       echo "未找到类型存根生成脚本，跳过此步骤"
      #       echo "stubs_updated=false" >> $GITHUB_OUTPUT
      #       exit 0
      #     fi
          
      #     # 检查类型存根是否有更新
      #     if git diff --quiet src/; then
      #       echo "类型存根没有变化"
      #       echo "stubs_updated=false" >> $GITHUB_OUTPUT
      #     else
      #       echo "发现了类型存根更新"
      #       echo "stubs_updated=true" >> $GITHUB_OUTPUT
      #     fi

      - name: 统计更新情况
        run: |
          echo "艾莉丝正在统计今天的文档更新情况~"
          
          # 统计API文档更新
          api_files=$(git diff --name-only docs/api-reference/ 2>/dev/null | wc -l)
          echo "API文档更新文件数: $api_files"
          
          # 统计AI Prompt文档更新
          ai_prompts=$(git diff --name-only docs/ai-support/prompts/ 2>/dev/null | wc -l)
          echo "AI Prompt文档更新文件数: $ai_prompts"
          
          # 统计文档索引更新
          docs_index=$(git diff --name-only docs/_meta/ 2>/dev/null | wc -l)
          echo "文档索引更新文件数: $docs_index"

      - name: 提交更新
        if: steps.update-api.outputs.api_updated == 'true' || steps.generate-ai-prompts.outputs.ai_prompts_updated == 'true' || steps.generate-docs-index.outputs.docs_index_updated == 'true'
        run: |
          echo "艾莉丝正在保存文档更新~"
          
          # 配置Git用户信息
          git config --local user.email "Eris@114514.1919"
          git config --local user.name "Eris[Bot]"
          
          # 添加所有更新的文档
          git add docs/api-reference/ docs/ai-support/prompts/ docs/_meta/
          
          # 生成提交信息
          commit_msg="艾莉丝的自动文档更新 [skip ci]
          
          自动更新了项目文档
          更新了API参考文档
          生成了AI Prompt文档
          更新了文档索引
          
          详情请查看 docs/ 目录"
          
          # 提交更改
          git commit -m "$commit_msg"
          git push

      - name: 文档更新完成
        if: steps.update-api.outputs.api_updated == 'true' || steps.generate-ai-prompts.outputs.ai_prompts_updated == 'true' || steps.generate-docs-index.outputs.docs_index_updated == 'true'
        run: |
          echo "艾莉丝今天也努力完成了文档更新呢"
          echo "所有文档已更新并提交到仓库"
          echo "包含了最新的API参考文档、AI Prompt文档和文档索引"
          echo "今天的文档工作完成啦~"

      - name: 无更新时的说明
        if: steps.update-api.outputs.api_updated != 'true' && steps.generate-ai-prompts.outputs.ai_prompts_updated != 'true' && steps.generate-docs-index.outputs.docs_index_updated != 'true'
        run: |
          echo "今天没有发现需要更新的文档呢~"
          echo "所有文档都是最新状态"
          echo "艾莉丝会继续守护着我们的文档库"
          echo "下次更新再见啦~"