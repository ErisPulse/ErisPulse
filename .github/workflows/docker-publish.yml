name: 🐳 Docker Hub 发布

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_dev:
        description: "推送 dev 标签"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: wsu2059/erispulse

jobs:
  docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU (多架构支持)
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag 触发: v2.4.0 → 2.4.0 + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # main 分支触发: dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            # 手动触发: dev
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' && inputs.push_dev == 'true' }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像信息
        run: |
          echo "==========================================="
          echo "  Docker 镜像发布成功"
          echo "==========================================="
          echo "镜像: ${{ env.IMAGE_NAME }}"
          echo "标签:"
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            echo "  - ${tag}"
          done
          echo "平台: linux/amd64, linux/arm64"
          echo "==========================================="
