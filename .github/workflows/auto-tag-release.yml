name: 🎀 艾莉丝的版本管理

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main, Pre-Release/v2]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-latest-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查 Release 是否已存在
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          tag_name="v$version"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          
          if gh release view "$tag_name" &>/dev/null; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release $tag_name 已存在，跳过重复发布"
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "Release $tag_name 不存在，继续发布流程"
          fi

      - name: 准备 Python 环境
        if: steps.check-release.outputs.release_exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        if: steps.check-release.outputs.release_exists != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 创建标签和发行
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # 读取当前版本
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          tag_name="v$version"
          
          echo "当前版本: $version"
          echo "标签名称: $tag_name"
          
          # 从 CHANGELOG.md 提取更新日志
          if [ -f "CHANGELOG.md" ]; then
            # 修复版本号格式：将 -de. 替换为 -dev.
            fixed_version=$(echo "$version" | sed 's/-de\./-dev./g')
            
            echo "尝试匹配版本: $version 或 $fixed_version"
            
            # 使用 sed 提取版本更新日志
            # 先尝试匹配原始版本号
            changelog_section=$(sed -n "/^## \[$version\] -/,/^## \[.*\] -/p" CHANGELOG.md | sed '$d')
            
            # 如果没找到，尝试匹配修复后的版本号
            if [ -z "$changelog_section" ]; then
              changelog_section=$(sed -n "/^## \[$fixed_version\] -/,/^## \[.*\] -/p" CHANGELOG.md | sed '$d')
            fi
            
            # 移除第一行（标题行）
            if [ -n "$changelog_section" ]; then
              changelog=$(echo "$changelog_section" | tail -n +2)
              
              # 判断是否为开发版本
              if [[ $version =~ dev|alpha|beta|pre|a|b ]]; then
                is_dev="true"
                latest_flag=""
              else
                is_dev="false"
                latest_flag="--latest"
              fi
              
              # 检查标签是否已存在
              if git rev-parse "$tag_name" >/dev/null 2>&1; then
                echo "标签 $tag_name 已存在，跳过创建"
                exit 0
              fi
              
              # 创建标签并推送
              echo "正在创建新标签 $tag_name"
              git tag "$tag_name"
              git push origin "$tag_name"
              
              # 创建发行
              echo "正在创建发行 $tag_name"
              gh release create "$tag_name" \
                --notes "$changelog" \
                --title "ErisPulse $tag_name" \
                --prerelease=$is_dev \
                $latest_flag
              echo "发行创建完成 $tag_name"
              echo "release_created=true" >> $GITHUB_OUTPUT
              
              echo "发行页面: https://github.com/${{ github.repository }}/releases/tag/$tag_name"
            else
              echo "未找到版本 $version 的更新日志"
            fi
          else
            echo "CHANGELOG.md 文件不存在"
          fi

      - name: 生成 AI 物料文档
        if: steps.create-release.outputs.release_created == 'true'
        run: |
          echo "艾莉丝开始生成 AI 物料文档~"
          
          # 确保输出目录存在
          mkdir -p docs/zh-CN/ai-support/prompts
          mkdir -p docs/zh-TW/ai-support/prompts
          mkdir -p docs/en/ai-support/prompts
          
          # 运行 AI prompt 生成脚本
          if [ -f "scripts/tools/generate-ai-prompts.py" ]; then
            python scripts/tools/generate-ai-prompts.py
            echo "AI 物料文档生成完成"
          else
            echo "未找到 AI Prompt 生成脚本，跳过此步骤"
          fi

      - name: 上传 AI 物料文档到 Release
        if: steps.create-release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "艾莉丝正在准备 AI 物料文档上传~"
          
          # 读取当前版本
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          tag_name="v$version"
          
          # 重命名文件为带语言标识的名称
          echo "重命名文件为带语言标识的名称..."
          
          # 创建临时目录存储重命名的文件
          mkdir -p temp_release_assets
          
          # 中文简体文件
          cp "docs/zh-CN/ai-support/prompts/ErisPulse-ModuleDev.md" "temp_release_assets/ErisPulse-ModuleDev-zh-CN.md"
          cp "docs/zh-CN/ai-support/prompts/ErisPulse-AdapterDev.md" "temp_release_assets/ErisPulse-AdapterDev-zh-CN.md"
          cp "docs/zh-CN/ai-support/prompts/ErisPulse-Full.md" "temp_release_assets/ErisPulse-Full-zh-CN.md"
          
          # 中文繁体文件
          cp "docs/zh-TW/ai-support/prompts/ErisPulse-ModuleDev.md" "temp_release_assets/ErisPulse-ModuleDev-zh-TW.md"
          cp "docs/zh-TW/ai-support/prompts/ErisPulse-AdapterDev.md" "temp_release_assets/ErisPulse-AdapterDev-zh-TW.md"
          cp "docs/zh-TW/ai-support/prompts/ErisPulse-Full.md" "temp_release_assets/ErisPulse-Full-zh-TW.md"
          
          # 英文文件
          cp "docs/en/ai-support/prompts/ErisPulse-ModuleDev.md" "temp_release_assets/ErisPulse-ModuleDev-en.md"
          cp "docs/en/ai-support/prompts/ErisPulse-AdapterDev.md" "temp_release_assets/ErisPulse-AdapterDev-en.md"
          cp "docs/en/ai-support/prompts/ErisPulse-Full.md" "temp_release_assets/ErisPulse-Full-en.md"
          
          # 验证重命名后的文件
          echo "检查重命名后的文件..."
          ls -la temp_release_assets/
          
          # 上传所有文件
          gh release upload "$tag_name" temp_release_assets/* --clobber
          
          echo "AI 物料文档上传完成"