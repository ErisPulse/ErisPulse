name: 🎀 艾莉丝的版本管理

permissions:
  contents: write

on:
  push:
    branches: [main, Pre-Release/v2]

jobs:
  update-latest-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 创建标签和发行
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # 读取当前版本
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          tag_name="v$version"
          
          echo "当前版本: $version"
          echo "标签名称: $tag_name"
          
          # 从 CHANGELOG.md 提取更新日志
          if [ -f "CHANGELOG.md" ]; then
            # 修复版本号格式：将 -de. 替换为 -dev.
            fixed_version=$(echo "$version" | sed 's/-de\./-dev./g')
            
            echo "尝试匹配版本: $version 或 $fixed_version"
            
            # 使用 sed 提取版本更新日志
            # 先尝试匹配原始版本号
            changelog_section=$(sed -n "/^## \[$version\] -/,/^## \[.*\] -/p" CHANGELOG.md | sed '$d')
            
            # 如果没找到，尝试匹配修复后的版本号
            if [ -z "$changelog_section" ]; then
              changelog_section=$(sed -n "/^## \[$fixed_version\] -/,/^## \[.*\] -/p" CHANGELOG.md | sed '$d')
            fi
            
            # 移除第一行（标题行）
            if [ -n "$changelog_section" ]; then
              changelog=$(echo "$changelog_section" | tail -n +2)
              
              # 判断是否为开发版本
              if [[ $version =~ dev|alpha|beta|pre|a|b ]]; then
                is_dev="true"
                latest_flag=""
              else
                is_dev="false"
                latest_flag="--latest"
              fi
              
              # 检查标签是否已存在
              if ! git rev-parse "$tag_name" >/dev/null 2>&1; then
                echo "正在创建新标签 $tag_name"
                git tag "$tag_name"
                git push origin "$tag_name"
              else
                echo "标签 $tag_name 已存在"
              fi
              
              # 检查发行是否存在
              if gh release view "$tag_name" &>/dev/null; then
                # 更新发行
                echo "正在更新发行 $tag_name"
                gh release edit "$tag_name" \
                  --notes "$changelog" \
                  --prerelease=$is_dev
                echo "发行更新完成 $tag_name"
                echo "release_updated=true" >> $GITHUB_OUTPUT
              else
                # 创建发行
                echo "正在创建发行 $tag_name"
                gh release create "$tag_name" \
                  --notes "$changelog" \
                  --title "ErisPulse $tag_name" \
                  --prerelease=$is_dev \
                  $latest_flag
                echo "发行创建完成 $tag_name"
                echo "release_created=true" >> $GITHUB_OUTPUT
              fi
              
              echo "发行页面: https://github.com/${{ github.repository }}/releases/tag/$tag_name"
            else
              echo "未找到版本 $version 的更新日志"
            fi
          else
            echo "CHANGELOG.md 文件不存在"
          fi

      - name: 生成 AI 物料文档
        if: steps.create-release.outputs.release_created == 'true' || steps.create-release.outputs.release_updated == 'true'
        run: |
          echo "艾莉丝开始生成 AI 物料文档~"
          
          # 确保输出目录存在
          mkdir -p docs/ai-support/prompts
          
          # 运行 AI prompt 生成脚本
          if [ -f "scripts/tools/generate-ai-prompts.py" ]; then
            python scripts/tools/generate-ai-prompts.py
            echo "AI 物料文档生成完成"
          else
            echo "未找到 AI Prompt 生成脚本，跳过此步骤"
          fi

      - name: 上传 AI 物料文档到 Release
        if: steps.create-release.outputs.release_created == 'true' || steps.create-release.outputs.release_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "艾莉丝正在上传 AI 物料文档到 Release~"
          
          # 读取当前版本
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          tag_name="v$version"
          
          # 上传 AI 物料文档
          gh release upload "$tag_name" \
            docs/ai-support/prompts/ErisPulse-ModuleDev.md \
            docs/ai-support/prompts/ErisPulse-AdapterDev.md \
            docs/ai-support/prompts/ErisPulse-Full.md \
            --clobber
          
          echo "AI 物料文档上传完成"
          echo "用户可以从以下链接下载文档:"
          echo "https://github.com/${{ github.repository }}/releases/download/$tag_name/ErisPulse-ModuleDev.md"
          echo "https://github.com/${{ github.repository }}/releases/download/$tag_name/ErisPulse-AdapterDev.md"
          echo "https://github.com/${{ github.repository }}/releases/download/$tag_name/ErisPulse-Full.md"