name: 🧪 艾莉丝的测试检查

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
  workflow_dispatch:

jobs:
  pytest-check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 准备环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: 运行测试
        id: pytest-check
        continue-on-error: true
        run: |
          echo "艾莉丝正在运行 Pytest 测试..."
          pytest_output=$(pytest -v --tb=short --cov-report=term-missing 2>&1; echo "PYTEST_EXIT_CODE=$?")
          exit_code=${pytest_output##*PYTEST_EXIT_CODE=}
          pytest_output=${pytest_output%PYTEST_EXIT_CODE=*}
          echo pytest_output

          echo "PYTEST_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$pytest_output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          if [ "$exit_code" -ne 0 ]; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交测试结果到PR
        if: steps.pytest-check.outputs.has_errors == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.login === '艾莉丝[bot]' && 
              comment.body.includes('测试结果')
            );
            
            const message = `测试结果
            
            \`\`\`
            ${process.env.PYTEST_OUTPUT}
            \`\`\`
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message
              });
            }